name: Daily agenda update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate index.html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "agenda-bot"
          git config user.email "agenda-bot@users.noreply.github.com"
          git add index.html scrape_report.json events_extracted.json run.log
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi
